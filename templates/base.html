<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sin Pena Improv{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('home') }}" class="logo">Sin Pena</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="{{ url_for('home') }}" class="nav-link">Home</a></li>
                <li><a href="{{ url_for('classes') }}" class="nav-link">Classes</a></li>
                <li><a href="{{ url_for('shows') }}" class="nav-link">Shows</a></li>
                <li><a href="{{ url_for('work_with_us') }}" class="nav-link">Work With Us</a></li>
                <li><a href="{{ url_for('about') }}" class="nav-link">About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>Sin Pena</h3>
                    <p>Serious Comedy. <em>Sin Pena.</em></p>
                </div>
                <div class="footer-links">
                    <a href="{{ url_for('home') }}">Home</a>
                    <a href="{{ url_for('classes') }}">Classes</a>
                    <a href="{{ url_for('shows') }}">Shows</a>
                    <a href="{{ url_for('work_with_us') }}">Work With Us</a>
                    <a href="{{ url_for('about') }}">About</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Rodolfo Mendoza LLC. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
